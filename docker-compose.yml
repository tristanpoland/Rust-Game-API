services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_HOST: db
      DATABASE_PORT: 3306
      DATABASE_NAME: card_game
      DATABASE_USER: root
      DATABASE_PASSWORD: change-me-root-password
      DB_CONNECT_RETRIES: 30
      DB_CONNECT_DELAY_SECS: 3
      JWT_SECRET: change-me-for-production
      JWT_EXPIRATION_SECS: 86400
    depends_on:
      - db

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: card_game
      MYSQL_ROOT_PASSWORD: change-me-root-password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
